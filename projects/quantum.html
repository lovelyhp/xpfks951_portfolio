<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}:root{--bg:#000000;--bg2:#111114;--bg3:#1a1a1f;--text:#e8e6e1;--text-dim:#8a8880;--text-muted:#555550;--accent:#c8ff00;--accent2:#00e5ff;--accent3:#ff3d5a;--font-main:'Pretendard Variable','Pretendard',sans-serif;--font-mono:'Space Mono',monospace}html{scroll-behavior:smooth;overflow-x:hidden}body{background:var(--bg);color:var(--text);font-family:var(--font-main);-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}::selection{background:var(--accent);color:var(--bg)}img{max-width:100%;display:block}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 40px;display:flex;align-items:center;justify-content:space-between;background:var(--bg)}nav .logo{font-weight:800;font-size:20px;color:#fff}nav .logo span{color:var(--accent)}nav .back{font-size:13px;color:#fff;display:flex;align-items:center;gap:8px;transition:color .3s}nav .back:hover{color:var(--accent)}nav .back svg{transition:transform .3s}nav .back:hover svg{transform:translateX(-4px)}
.project-hero{height:70vh;min-height:480px;position:relative;overflow:hidden;display:flex;align-items:flex-end}.project-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.5}.project-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(0,0,0,.3) 50%,rgba(0,0,0,.6) 100%)}.project-hero-content{position:relative;z-index:1;padding:60px 40px;width:100%}.project-tag{font-family:var(--font-mono);font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:16px}.project-title{font-weight:900;font-size:clamp(36px,6vw,72px);letter-spacing:-2px;line-height:1}.project-subtitle{font-size:16px;color:var(--text-dim);margin-top:12px;max-width:600px;line-height:1.6}
.project-meta{display:flex;gap:48px;padding:48px 40px;border-bottom:1px solid rgba(255,255,255,.05)}.meta-item{display:flex;flex-direction:column;gap:4px}.meta-label{font-family:var(--font-mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted)}.meta-value{font-size:14px;color:var(--text-dim)}
.project-content{max-width:1200px;margin:0 auto;padding:80px 40px}.project-content h3{font-weight:700;font-size:24px;letter-spacing:-1px;margin:64px 0 24px;padding-top:32px;border-top:1px solid rgba(255,255,255,.05)}.project-content h3:first-child{margin-top:0;border-top:none;padding-top:0}.project-content p{font-size:15px;color:var(--text-dim);line-height:1.8;margin-bottom:24px;max-width:720px}.img-full{margin:40px 0;border-radius:12px;overflow:hidden}.img-full img{width:100%}.img-grid{display:grid;grid-template-columns:1fr;gap:16px;margin:40px 0}.img-grid img{border-radius:12px}.img-caption{font-size:12px;color:var(--text-muted);margin-top:8px;text-align:center}
.project-nav{display:flex;justify-content:space-between;align-items:center;padding:60px 40px;border-top:1px solid rgba(255,255,255,.05)}.project-nav a{font-size:13px;color:var(--text-dim);transition:color .3s;display:flex;align-items:center;gap:8px}.project-nav a:hover{color:var(--accent)}
footer{padding:40px;border-top:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center}footer .copy{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}footer .links{display:flex;gap:24px}footer .links a{font-size:12px;color:var(--text-muted);transition:color .3s}footer .links a:hover{color:var(--accent)}
.reveal{opacity:0;transform:translateY(30px);transition:all .7s cubic-bezier(.25,.46,.45,.94)}.reveal.visible{opacity:1;transform:translateY(0)}
.thankyou{text-align:center;padding:80px 0 40px;border-top:1px solid rgba(255,255,255,.05);margin-top:64px}
.thankyou p{font-size:clamp(20px,3vw,32px);font-weight:300;color:var(--text-muted);letter-spacing:2px}
@media(max-width:768px){nav{padding:16px 20px}.project-hero-content{padding:40px 20px}.project-meta{padding:32px 20px;gap:24px;flex-wrap:wrap}.project-content{padding:48px 20px}.img-grid{grid-template-columns:1fr}.project-nav{padding:40px 20px;flex-direction:column;gap:24px}footer{flex-direction:column;gap:12px;padding:24px 20px}}
</style>
</head>

<script>
const reveals=document.querySelectorAll('.reveal');
const observer=new IntersectionObserver(e=>{e.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:.1,rootMargin:'0px 0px -40px 0px'});
reveals.forEach(el=>observer.observe(el));
</script>
